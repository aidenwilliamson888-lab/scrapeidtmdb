<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TMDB FULL SEO + MD GENERATOR</title>
<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: #fff;
    text-align: center;
    padding: 20px;
}
textarea, input, select {
    width: 90%;
    margin: 10px;
    padding: 10px;
}
button {
    padding: 10px 20px;
    background: #ff2e63;
    border: none;
    color: #fff;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>🔥 AGC SEO + HTML + MD</h2>

<input type="text" id="apiKey" placeholder="TMDB API Key">
<textarea id="ids" placeholder="ID per baris"></textarea>

<input type="text" id="baseUrl" placeholder="https://domain.com/">

<input type="text" id="titleFormat" 
value="WATCH {TITLE} {YEAR} FULLMOVIE Available Now Online Streamings">

<select id="lang">
<option value="en-US">EN</option>
<option value="es-ES">ES</option>
<option value="es-MX">ES-MX</option>
<option value="fr-FR">FR</option>
<option value="it-IT">IT</option>
<option value="th-TH">TH</option>
<option value="vi-VN">VI</option>
</select>

<br>
<button onclick="generate()">🚀 Generate</button>

<h3>HTML Output</h3>
<textarea id="htmlOutput"></textarea>

<h3>Markdown Output (.md)</h3>
<textarea id="mdOutput"></textarea>

<br>
<button onclick="downloadMD()">⬇️ Download .md</button>

<script>

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function getRegion(lang){
    return lang.split("-")[1];
}

function getCTA(lang){
    const map = {
        "en-US":"WATCH NOW",
        "es-ES":"VER AHORA",
        "es-MX":"VER AHORA",
        "fr-FR":"REGARDER",
        "it-IT":"GUARDA ORA",
        "th-TH":"ดูเลย",
        "vi-VN":"XEM NGAY"
    };
    return map[lang];
}

function longHTML(title, overview){
return `
<h1>${title}</h1>

<p>${overview}</p>

<h2>Watch ${title} Full Movie Online</h2>
<p>If you are looking to watch ${title} online, this is the best place to start.</p>

<h2>Why ${title} Is Popular</h2>
<p>${title} is trending worldwide due to its story, visuals, and audience engagement.</p>

<h2>About the Movie</h2>
<p>${overview}</p>

<h2>Streaming Info</h2>
<p>You can watch ${title} online in HD quality anytime.</p>
`;
}

function longMD(title, overview, link, cta){
return `
# ${title}

${overview}

## Watch ${title} Online
${overview}

## Why This Movie is Trending
${title} is one of the most searched movies online.

## Streaming Info
Watch now in HD quality.

[${cta}](${link})
`;
}

async function generate(){
    const apiKey = document.getElementById('apiKey').value;
    const ids = document.getElementById('ids').value.split("\n");
    const baseUrl = document.getElementById('baseUrl').value;
    const format = document.getElementById('titleFormat').value;
    const lang = document.getElementById('lang').value;
    const region = getRegion(lang);

    let htmlAll = "";
    let mdAll = "";

    for(let id of ids){
        if(!id.trim()) continue;

        let url = `https://api.themoviedb.org/3/movie/${id}?api_key=${apiKey}&language=${lang}&region=${region}`;

        let res = await fetch(url);
        let data = await res.json();

        let title = data.title;
        let year = data.release_date ? data.release_date.split("-")[0] : "";
        let overview = data.overview || "";

        let finalTitle = format.replace("{TITLE}", title).replace("{YEAR}", year);

        let link = baseUrl.replace(/\/$/,"") + "/" + id;
        let cta = getCTA(lang);

        let poster = data.poster_path 
            ? "https://image.tmdb.org/t/p/w500" + data.poster_path 
            : "";

        // HTML
        let html = `
<!DOCTYPE html>
<html>
<head>
<title>${finalTitle}</title>
<meta name="description" content="${overview.substring(0,150)}">
<meta property="og:image" content="${poster}">
</head>
<body style="background:#000;color:#fff;text-align:center">

<img src="${poster}" style="max-width:300px">

${longHTML(finalTitle, overview)}

<a href="${link}" style="display:inline-block;padding:15px;background:red;color:#fff;margin-top:20px">
${cta}
</a>

</body>
</html>
`;

        // MD
        let md = longMD(finalTitle, overview, link, cta);

        htmlAll += html + "\n\n<!-- NEXT -->\n\n";
        mdAll += md + "\n\n---\n\n";

        await sleep(300);
    }

    document.getElementById('htmlOutput').value = htmlAll;
    document.getElementById('mdOutput').value = mdAll;
}

function downloadMD(){
    const blob = new Blob([document.getElementById('mdOutput').value], {type:'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "movies.md";
    a.click();
}

</script>

</body>
</html>
