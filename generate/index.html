<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TMDB FULL SEO AGC PRO</title>
<style>
body {
    font-family: Arial;
    background: #0b0b0b;
    color: #fff;
    text-align: center;
    padding: 20px;
}
textarea, input, select {
    width: 90%;
    margin: 10px;
    padding: 10px;
}
button {
    padding: 10px 20px;
    background: #ff2e63;
    border: none;
    color: #fff;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>🔥 FULL SEO AGC + REGION FIX</h2>

<input type="text" id="apiKey" placeholder="TMDB API Key">
<textarea id="ids" placeholder="ID per baris"></textarea>

<input type="text" id="baseUrl" placeholder="https://domain.com/">

<input type="text" id="titleFormat" 
value="WATCH {TITLE} {YEAR} FULLMOVIE Available Now Online Streamings">

<select id="lang">
<option value="en-US">EN</option>
<option value="es-ES">ES</option>
<option value="es-MX">ES-MX</option>
<option value="fr-FR">FR</option>
<option value="it-IT">IT</option>
<option value="th-TH">TH</option>
<option value="vi-VN">VI</option>
</select>

<br>
<button onclick="generate()">🚀 Generate</button>

<textarea id="output"></textarea>

<script>

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function getRegion(lang){
    return lang.split("-")[1];
}

function getCTA(lang){
    const map = {
        "en-US":"WATCH NOW",
        "es-ES":"VER AHORA",
        "es-MX":"VER AHORA",
        "fr-FR":"REGARDER",
        "it-IT":"GUARDA ORA",
        "th-TH":"ดูเลย",
        "vi-VN":"XEM NGAY"
    };
    return map[lang];
}

function longSEOContent(title, overview){
return `
<h1>${title}</h1>

<p>${overview}</p>

<h2>Watch ${title} Full Movie Online</h2>
<p>If you are looking to watch ${title} online, you are in the right place. This movie has become one of the most searched titles online due to its popularity, engaging storyline, and high production quality.</p>

<p>${title} offers an immersive cinematic experience that keeps viewers engaged from start to finish. With a compelling plot and well-developed characters, it stands out among other films released in recent years.</p>

<h2>Why ${title} Is Trending Right Now</h2>
<p>The popularity of ${title} continues to rise globally. Many users are searching for ways to stream the movie online in high definition. This is due to its strong reviews, growing fanbase, and wide international appeal.</p>

<p>Streaming ${title} online allows viewers to enjoy the film anytime and anywhere without limitations. This flexibility is one of the main reasons why online streaming has become the preferred method of watching movies today.</p>

<h2>Streaming ${title} in HD Quality</h2>
<p>Watching ${title} in HD ensures the best viewing experience. High-definition streaming provides clear visuals, crisp audio, and a more immersive experience overall.</p>

<p>Whether you are watching on mobile, desktop, or smart TV, ${title} delivers consistent quality across all devices.</p>

<h2>About the Movie</h2>
<p>${overview}</p>

<h2>Where to Watch ${title} Online</h2>
<p>${title} is now available for online streaming. Click the button below to start watching instantly. No delays, no hassle, just seamless entertainment.</p>
`;
}

async function generate(){
    const apiKey = document.getElementById('apiKey').value;
    const ids = document.getElementById('ids').value.split("\n");
    const baseUrl = document.getElementById('baseUrl').value;
    const format = document.getElementById('titleFormat').value;
    const lang = document.getElementById('lang').value;
    const region = getRegion(lang);

    let out = "";

    for(let id of ids){
        if(!id.trim()) continue;

        let url = `https://api.themoviedb.org/3/movie/${id}?api_key=${apiKey}&language=${lang}&region=${region}`;

        let res = await fetch(url);
        let data = await res.json();

        let title = data.title;
        let year = data.release_date ? data.release_date.split("-")[0] : "";
        let overview = data.overview || "";

        let finalTitle = format.replace("{TITLE}", title).replace("{YEAR}", year);

        let cta = getCTA(lang);
        let link = baseUrl.replace(/\/$/,"") + "/" + id;

        let poster = data.poster_path 
            ? "https://image.tmdb.org/t/p/w500" + data.poster_path 
            : "";

        out += `
<!DOCTYPE html>
<html>
<head>
<title>${finalTitle}</title>

<meta name="description" content="${overview.substring(0,155)}">
<meta name="keywords" content="${title}, watch ${title}, full movie, streaming online">

<meta property="og:title" content="${finalTitle}">
<meta property="og:image" content="${poster}">
<meta property="og:type" content="website">

</head>

<body style="background:#000;color:#fff;text-align:center;font-family:sans-serif">

<img src="${poster}" style="max-width:300px;border-radius:10px">

${longSEOContent(finalTitle, overview)}

<a href="${link}" style="display:inline-block;padding:15px 30px;background:red;color:#fff;margin-top:20px;text-decoration:none;font-weight:bold">
${cta}
</a>

</body>
</html>

<!-- NEXT -->

`;

        await sleep(300);
    }

    document.getElementById('output').value = out;
}

</script>

</body>
</html>
