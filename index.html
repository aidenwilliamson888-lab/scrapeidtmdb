<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TMDB FULL COUNTRY SCRAPER</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: #fff;
    text-align: center;
    padding: 20px;
}
select, input, button {
    padding: 10px;
    margin: 10px;
    border-radius: 6px;
    border: none;
}
button {
    background: #18aae8;
    color: #fff;
    cursor: pointer;
}
textarea {
    width: 95%;
    height: 300px;
}
</style>
</head>

<body>

<h2>🔥 TMDB FULL COUNTRY SCRAPER</h2>

<input type="text" id="apiKey" placeholder="TMDB API Key"><br>

<select id="type">
<option value="popular">Popular</option>
<option value="now_playing">Now Playing</option>
<option value="upcoming">Upcoming</option>
</select>

<select id="region">
<option value="US">United States</option>
<option value="GB">United Kingdom</option>
<option value="CA">Canada</option>
<option value="AU">Australia</option>
<option value="NZ">New Zealand</option>

<option value="ID">Indonesia</option>
<option value="MY">Malaysia</option>
<option value="SG">Singapore</option>
<option value="TH">Thailand</option>
<option value="VN">Vietnam</option>
<option value="PH">Philippines</option>

<option value="KR">South Korea</option>
<option value="JP">Japan</option>
<option value="CN">China</option>
<option value="HK">Hong Kong</option>
<option value="TW">Taiwan</option>
<option value="IN">India</option>

<option value="AE">UAE</option>
<option value="SA">Saudi Arabia</option>
<option value="TR">Turkey</option>
<option value="IL">Israel</option>

<option value="FR">France</option>
<option value="DE">Germany</option>
<option value="IT">Italy</option>
<option value="ES">Spain</option>
<option value="PT">Portugal</option>
<option value="NL">Netherlands</option>
<option value="BE">Belgium</option>
<option value="CH">Switzerland</option>
<option value="AT">Austria</option>
<option value="SE">Sweden</option>
<option value="NO">Norway</option>
<option value="DK">Denmark</option>
<option value="FI">Finland</option>
<option value="PL">Poland</option>
<option value="CZ">Czech Republic</option>
<option value="HU">Hungary</option>
<option value="RO">Romania</option>
<option value="BG">Bulgaria</option>
<option value="GR">Greece</option>
<option value="UA">Ukraine</option>
<option value="RU">Russia</option>

<option value="BR">Brazil</option>
<option value="MX">Mexico</option>
<option value="AR">Argentina</option>
<option value="CL">Chile</option>
<option value="CO">Colombia</option>
<option value="PE">Peru</option>
<option value="VE">Venezuela</option>

<option value="ZA">South Africa</option>
<option value="EG">Egypt</option>
<option value="NG">Nigeria</option>
<option value="KE">Kenya</option>
<option value="MA">Morocco</option>
</select>

<label>
<input type="checkbox" id="allRegions"> 🌍 All Countries
</label>

<select id="target">
<option value="500">500</option>
<option value="1000">1000</option>
<option value="5000">5000</option>
<option value="10000">10000</option>
</select>

<br>
<button onclick="scrape()">🚀 Start</button>
<button onclick="downloadTXT()">⬇️ Download</button>

<textarea id="output"></textarea>

<script>

const regions = [
"US","GB","CA","AU","NZ","ID","MY","SG","TH","VN","PH",
"KR","JP","CN","HK","TW","IN","AE","SA","TR","IL",
"FR","DE","IT","ES","PT","NL","BE","CH","AT","SE","NO","DK","FI",
"PL","CZ","HU","RO","BG","GR","UA","RU",
"BR","MX","AR","CL","CO","PE","VE",
"ZA","EG","NG","KE","MA"
];

let results = [];

function sleep(ms){
    return new Promise(r=>setTimeout(r,ms));
}

function getLang(region){
    return "en-" + region;
}

async function fetchRegion(apiKey, type, region, target){
    let page = 1;

    while(results.length < target && page <= 500){
        let url = `https://api.themoviedb.org/3/movie/${type}?api_key=${apiKey}&page=${page}&region=${region}&language=${getLang(region)}`;

        let res = await fetch(url);
        let data = await res.json();

        if(!data.results) break;

        data.results.forEach(m=>{
            if(m.id && results.length < target){
                results.push(m.id);
            }
        });

        document.getElementById("output").value += `[${region}] Page ${page}\n`;

        page++;
        await sleep(200);
    }
}

async function scrape(){
    const apiKey = document.getElementById("apiKey").value;
    const type = document.getElementById("type").value;
    const region = document.getElementById("region").value;
    const all = document.getElementById("allRegions").checked;
    const target = parseInt(document.getElementById("target").value);

    if(!apiKey){
        alert("API key kosong!");
        return;
    }

    results = [];
    document.getElementById("output").value = "Start...\n";

    if(all){
        for(let r of regions){
            await fetchRegion(apiKey, type, r, target);
        }
    } else {
        await fetchRegion(apiKey, type, region, target);
    }

    results = [...new Set(results)];

    document.getElementById("output").value = results.join("\n");
}

function downloadTXT(){
    const blob = new Blob([results.join("\n")], {type:"text/plain"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tmdb_ids.txt";
    a.click();
}

</script>

</body>
</html>
