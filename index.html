<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TMDB Region ID Scraper</title>
<style>
body {
    font-family: Arial;
    background: #111;
    color: #fff;
    text-align: center;
    padding: 20px;
}
input, select, button {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}
button {
    background: #18aae8;
    color: #fff;
    cursor: pointer;
}
textarea {
    width: 90%;
    height: 300px;
    margin-top: 20px;
}
</style>
</head>
<body>

<h2>🔥 TMDB ID SCRAPER (REGION VERSION)</h2>

<input type="text" id="apiKey" placeholder="TMDB API Key" size="40"><br>

<select id="type">
    <option value="popular">Popular</option>
    <option value="now_playing">Now Playing</option>
    <option value="upcoming">Upcoming</option>
</select>

<select id="region">
    <option value="US">United States</option>
    <option value="ES">Spain</option>
    <option value="MX">Mexico</option>
    <option value="FR">France</option>
    <option value="IT">Italy</option>
    <option value="TH">Thailand</option>
    <option value="VN">Vietnam</option>
    <option value="BG">Bulgaria</option>
    <option value="KR">South Korea</option>
</select>

<select id="language">
    <option value="en-US">English</option>
    <option value="es-ES">Spanish</option>
    <option value="es-MX">Spanish (MX)</option>
    <option value="fr-FR">French</option>
    <option value="it-IT">Italian</option>
    <option value="th-TH">Thai</option>
    <option value="vi-VN">Vietnamese</option>
    <option value="bg-BG">Bulgarian</option>
    <option value="ko-KR">Korean</option>
</select>

<select id="target">
    <option value="500">500 ID</option>
    <option value="1000">1000 ID</option>
    <option value="5000">5000 ID</option>
    <option value="10000">10000 ID</option>
</select>

<br>
<button onclick="scrape()">🚀 Start Scrape</button>
<button onclick="downloadTXT()">⬇️ Download TXT</button>

<textarea id="output"></textarea>

<script>
let results = [];

function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function scrape() {
    const apiKey = document.getElementById('apiKey').value;
    const type = document.getElementById('type').value;
    const region = document.getElementById('region').value;
    const language = document.getElementById('language').value;
    const target = parseInt(document.getElementById('target').value);

    if (!apiKey) {
        alert("Masukkan API Key!");
        return;
    }

    results = [];
    let page = 1;

    document.getElementById('output').value = "Scraping...\n";

    while (results.length < target && page <= 500) {
        try {
            let url = `https://api.themoviedb.org/3/movie/${type}?api_key=${apiKey}&page=${page}&region=${region}&language=${language}`;

            let res = await fetch(url);
            let data = await res.json();

            if (!data.results) break;

            data.results.forEach(movie => {
                if (movie.id && results.length < target) {
                    results.push(movie.id);
                }
            });

            document.getElementById('output').value += `Page ${page} ✔ (${results.length}/${target})\n`;

            page++;

            await sleep(250);

        } catch (err) {
            console.log(err);
            break;
        }
    }

    results = [...new Set(results)];

    document.getElementById('output').value = results.join("\n");
}

function downloadTXT() {
    const blob = new Blob([results.join("\n")], {type : 'text/plain'});
    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = 'tmdb_ids_region.txt';
    a.click();
}
</script>

</body>
</html>
